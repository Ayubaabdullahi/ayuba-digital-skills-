<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Presidential Classroom | Ayuba Digital Skills Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #050a18;
            --accent: #c5a059;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --room-bg: #0a1120;
            --text-main: #e6f1ff;
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; overflow-x: hidden; 
            background: var(--primary); color: var(--text-main); 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* --- SIDEBAR --- */
        #mSidebar {
            width: 290px; background: #050a18; border-right: 1px solid var(--glass-border);
            position: fixed; left: -290px; height: 100vh; z-index: 5000; 
            transition: 0.4s cubic-bezier(0.7, 0, 0.3, 1); padding: 25px 15px; overflow-y: auto;
        }
        #mSidebar.m-open { left: 0; }
        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 1.8rem; color: var(--accent); cursor: pointer; }
        
        .nav-label { font-size: 0.6rem; color: #475569; letter-spacing: 2px; font-weight: 800; padding: 15px 15px 5px; display: block; }
        .nav-item { padding: 12px 15px; color: #8892b0; text-decoration: none; display: flex; align-items: center; gap: 12px; border-radius: 12px; margin-bottom: 5px; transition: 0.3s; font-weight: 600; font-size: 0.9rem; }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--accent); border: 1px solid var(--glass-border); }

        /* --- STAGE --- */
        .top-hud { height: 85px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; background: rgba(5,10,24,0.98); backdrop-filter: blur(10px); z-index: 2000; width: 100%; }
        .user-pill { background: var(--glass); padding: 8px 16px; border-radius: 50px; border: 1px solid var(--glass-border); display: flex; align-items: center; gap: 8px; color: var(--accent); font-weight: 800; font-size: 0.75rem; }

        .classroom-container { max-width: 1400px; margin: 0 auto; padding: 30px 15px; display: grid; grid-template-columns: 1fr 300px; gap: 25px; }
        
        .house-intro { 
            background: linear-gradient(135deg, rgba(197, 160, 89, 0.1), transparent);
            padding: 40px; border-radius: 30px; border-left: 8px solid var(--accent); margin-bottom: 40px;
        }
        .house-intro h1 { font-family: 'Outfit'; font-size: 2.2rem; color: #fff; margin-bottom: 10px; }

        .video-room { 
            background: var(--room-bg); border: 1px solid var(--glass-border); 
            border-radius: 35px; overflow: hidden; margin-bottom: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .room-tv { width: 100%; position: relative; padding-bottom: 56.25%; background: #000; border-bottom: 4px solid var(--accent); }
        .room-tv iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .room-details { padding: 35px; }
        .room-details h2 { font-family: 'Outfit'; font-size: 1.6rem; margin-bottom: 10px; color: #fff; }
        .room-desc { font-size: 0.95rem; color: #94a3b8; line-height: 1.8; padding: 20px; border-radius: 15px; background: rgba(255,255,255,0.02); border-left: 4px solid var(--accent); }

        .tool-card { background: var(--glass); border-radius: 25px; padding: 25px; border: 1px solid var(--glass-border); position: sticky; top: 100px; }
        .social-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .social-btn { height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 12px; background: rgba(255,255,255,0.05); color: var(--accent); font-size: 1.2rem; transition: 0.3s; text-decoration: none; }
        .social-btn:hover { background: var(--accent); color: #000; transform: translateY(-3px); }

        #mOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 4500; display: none; backdrop-filter: blur(4px); }
        #mOverlay.active { display: block; }

        @media (max-width: 1100px) { .classroom-container { grid-template-columns: 1fr; } .tool-card { position: relative; top: 0; } }
    </style>
</head>

                    {id: 'wAkrUWe5AfU', t: '[L1] Mobile AI', d: 'Sarrafa AI duka a cikin wayarka.'},
                    {id: 'w6j3m2cP6kE', t: '[L1] AI Business', d: 'Amfani da AI a kasuwancinka.'},

        const params = new URLSearchParams(window.location.search);
        const type = params.get('type') || 'web';

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('userName').innerText = data.fullName || "Student";
                    
                    // ACCESS CONTROL
                    if(data.accessPro && data.approved) {
                        document.getElementById('proGate').style.display = 'block';
                    }
                    
                    if(data.role === 'admin' || user.email === "ayubaabdullahiumar@gmail.com") {
                        document.getElementById('adminGate').style.display = 'block';
                    }
                }
                renderClassroom();
            } else { window.location.replace("auth.html"); }
        });

        function renderClassroom() {
            const grid = document.getElementById('mMainGrid');
            const hLevel = document.getElementById('courseLevel');
            grid.innerHTML = ''; 

            if(type === 'pro') {
                hLevel.innerText = "SECTION: ELITE ALL-IN-ONE";
                Object.keys(ACADEMY_DB).forEach(key => {
                    grid.appendChild(createIntro(ACADEMY_DB[key]));
                    ACADEMY_DB[key].vids.forEach((v, i) => grid.appendChild(createRoom(v, i+1)));
                });
            } else {
                const course = ACADEMY_DB[type] || ACADEMY_DB['web'];
                hLevel.innerText = `SECTION: ${course.name.toUpperCase()}`;
                grid.appendChild(createIntro(course));
                course.vids.forEach((v, i) => grid.appendChild(createRoom(v, i+1)));
            }
        }

        function createIntro(course) {
            const div = document.createElement('div');
            div.className = 'house-intro';
            div.innerHTML = `<h1>${course.name}</h1><p>${course.intro}</p>`;
            return div;
        }

        function createRoom(v, num) {
            const div = document.createElement('div');
            div.className = 'video-room';
            div.innerHTML = `
                <div class="room-tv">
                    <iframe src="https://www.youtube.com/embed/${v.id}?rel=0" allow="accelerometer; gyroscope; magnetometer; autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
                </div>
                <div class="room-details">
                    <span style="color:var(--accent); font-weight:800; font-size:0.65rem; letter-spacing:1px;">LESSON #${num}</span>
                    <h2>${v.t}</h2>
                    <p class="room-desc">${v.d}</p>
                </div>`;
            return div;
        }

        window.mToggleMenu = () => {
            document.getElementById('mSidebar').classList.toggle('m-open');
            document.getElementById('mOverlay').classList.toggle('active');
        };

        let sec = 0; setInterval(() => { sec++; let m = Math.floor(sec/60); let s = sec%60; document.getElementById('mTimer').innerText = `${m<10?'0'+m:m}:${s<10?'0'+s:s}`; }, 1000);
    </script>
</body>
